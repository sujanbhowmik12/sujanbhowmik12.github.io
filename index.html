<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #333;
            color: white;
            text-align: center;
            padding: 30px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-top: -60px;
            background: white;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        h2 {
            margin: 10px 0;
        }

        .info {
            margin: 15px 0;
            color: #555;
        }

        .skills {
            margin-top: 20px;
        }

        .skills span {
            display: inline-block;
            background: #4facfe;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
        }

        .social a {
            text-decoration: none;
            margin: 10px;
            display: inline-block;
            color: white;
            background: #333;
            padding: 10px 15px;
            border-radius: 5px;
        }

        .social a:hover {
            background: #4facfe;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>My Profile</h1>
        </div>

        <div class="content">

            <img src="https://via.placeholder.com/120" class="webprofileimage.jpeg">

            <h2>SUJAN BHOWMIK</h2>
            <p class="info">CSE Student | Web Developer | AI Enthusiast</p>

            <p>Hello! I am a passionate developer who loves building websites and learning new technologies.</p>

            <div class="skills">
                <h3>Skills</h3>
                <span>HTML</span>
                <span>CSS</span>
                <span>JavaScript</span>
                <span>Python</span>
            </div>

            <div class="social">
                <h3>Contact Me</h3>
                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>
                <a href="#">Email</a>
            </div>

        </div>

    </div>

</body>
</html>
